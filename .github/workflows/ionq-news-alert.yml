name: IonQ News Alert

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Send a Discord test message instead of checking IonQ news"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run IonQ news monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: python monitor_ionq_news.py

      - name: Save seen news
        if: ${{ github.event.inputs.test_mode != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ionq_news.json
          git diff --cached --quiet || git commit -m "Update seen IonQ news"
          git push
